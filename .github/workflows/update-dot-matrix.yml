name: Update dot matrix card

on:
  workflow_dispatch:
  schedule:
    - cron: "5 16 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate card
        run: node scripts/generate-dot-matrix.js

      - name: Commit card
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain assets/dot-matrix.svg)" ]]; then
            echo "No dot matrix changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/dot-matrix.svg
          git commit -m "chore: update dot matrix card"
          git push
