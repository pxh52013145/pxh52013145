name: Update profile matrix cards

on:
  workflow_dispatch:
  schedule:
    - cron: "5 16 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate cards
        run: node scripts/generate-dot-matrix.js

      - name: Commit cards
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain assets/dot-matrix.svg assets/signal-cache.svg README.md scripts/quote-history.json)" ]]; then
            echo "No profile card changes."
            exit 0
          fi

          git config user.name "pxh52013145"
          git config user.email "145483973+pxh52013145@users.noreply.github.com"
          git add assets/dot-matrix.svg assets/signal-cache.svg README.md scripts/quote-history.json
          git commit -m "chore: update profile matrix cards"
          git push
